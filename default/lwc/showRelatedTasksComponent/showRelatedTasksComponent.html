<!--
  @description       : Displays related tasks for a record with creation and management capabilities
  @author            : Daniel Flores
  @group             : 
  @last modified on  : 13-02-2026
  @last modified by  : Daniel Flores
-->
<template>
  <lightning-card>
    <div class="slds-card__header slds-m-bottom_small slds-border_bottom">
      <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-right_medium">
        <div class="slds-media">
          <div class="slds-media__figure">
            <lightning-icon icon-name="standard:task" size="small"></lightning-icon>
          </div>
          <div class="slds-media__body">
            <span class="slds-text-heading_small" style="color: var(--lwc-brandTextLink);">{headerLabel}</span>
          </div>
        </div>
        <div class="slds-grid slds-grid_vertical-align-center" style="gap:0.2rem">
          <lightning-input type="search" placeholder="Buscar..." oninput={handleSearchChange} onchange={handleSearchChange} value={searchTerm} class="slds-p-bottom_medium slds-m-right_small"></lightning-input>
          <lightning-button-icon icon-name="utility:refresh" alternative-text="Recargar" title="Recargar tareas" onclick={refreshTasks} class="slds-m-right_small"></lightning-button-icon>
          <lightning-button-icon
            class="slds-m-right_small"
            icon-name="utility:expand"
            variant="border-filled"
            alternative-text="Expand All"
            onclick={expandAllActivities}
          ></lightning-button-icon>
          <lightning-button-icon icon-name="utility:add" alternative-text="Nueva tarea" title="Nueva tarea" onclick={openCreateModal} class="slds-m-right_small addButton" variant="brand"></lightning-button-icon>
        </div>
      </div>
    </div>

    <div class="slds-p-horizontal_small" style="max-height: 50vh; min-height: 250px; overflow-y: auto">
      <template if:true={loading}>
        <lightning-spinner alternative-text="Cargando" size="small"></lightning-spinner>
      </template>
      <template if:false={loading}>
        <template if:true={hasTasks}>
          <ul class="slds-timeline showRelatedTasksTimeline" style="position: relative">
            <template for:each={taskGroupsView} for:item="group">
              <li class="slds-m-top_medium" key={group.id}>
                <div class={group.containerClass} data-id={group.id}>
                  <span class="slds-assistive-text">Tarea</span>
                  <div class="slds-media">
                    <div class="slds-media__figure">
                        <button class="slds-button slds-button_icon" aria-expanded={group.isExpanded} data-id={group.id} onclick={toggleExpand}>
                          <lightning-icon
                            icon-name={group.expandIconName}
                            size="x-small"
                            class="slds-button__icon"
                            style="pointer-events: all"
                          ></lightning-icon>
                        </button>
                    </div>
                    <div class="slds-icon_container slds-timeline__icon" title="Tarea">
                        <lightning-icon icon-name="standard:task" size="small" title="Tarea"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                      <div class="slds-grid slds-grid_align-spread slds-timeline__trigger" style="flex-wrap: wrap; align-items: start">
                        <div class="slds-grid slds-grid_vertical-align-center slds-no-space">
                          <h3 class="slds-truncate" title={group.parent.subjectDisplay}>
                            <a class={group.parent.titleClass} data-id={group.parent.Id} onclick={navigateToTask}>{group.parent.subjectDisplay}</a>
                          </h3>
                        </div>
                        <span class="slds-m-horizontal_xx-small" style="margin-left: auto">
                          <div style="display: flex; flex-direction: row;align-items: center;">
                            <span data-id={group.parent.OwnerId} onclick={navigate} class="UseLink slds-m-right_small" style="color: var(--lwc-colorTextLinkDisabled)">{group.parent.ownerName}</span>
                            <span class="slds-avatar slds-avatar_circle" style="height: unset">
                              <img style="border-radius: 15px;padding: 1px;width: 25px;"
                                alt={group.parent.ownerName}
                                src={group.parent.CreatedBy.SmallPhotoUrl}
                                title={group.parent.ownerName}
                              />
                            </span>
                          </div>
                        </span>
                        <div class="slds-timeline__actions">
                          <template if:true={group.parent.createdDate}>
                            <span class="slds-timeline__date slds-m-left_small slds-m-top_xx-small" style="margin-top: 5px;">
                              <lightning-formatted-date-time value={group.parent.createdDate} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                            </span>
                          </template>
                        </div>
                        <!--<div class="slds-grid slds-grid_vertical-align-center slds-no-space">
                          <div class="slds-timeline__actions">
                            <div class="slds-p-right_small">
                              <a class="titleLinkNoBold" data-id={group.parent.OwnerId}>{group.parent.ownerName}</a>
                            </div>
                            <p class="slds-timeline__date slds-p-right_small" data-id={group.id} onclick={toggleExpand} style="cursor:pointer;">
                              <template if:true={group.parent.createdDate}>
                                <span class="slds-m-left_small">
                                  <lightning-formatted-date-time value={group.parent.createdDate} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                </span>
                              </template>
                            </p>
                          </div>
                        </div>-->
                      </div>
                      <template if:true={group.isExpanded}>
                        <article class="slds-box slds-theme_shade slds-p-around_medium slds-m-top_xx-small" style="margin-bottom: none;">
                          <ul class="slds-list_horizontal slds-wrap slds-m-left_medium">
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Asignado a:</span>
                              <span class="slds-text-body_medium" title={group.parent.ownerName}>{group.parent.ownerName}</span>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Estado:</span>
                              <span class="slds-text-body_medium" title={group.parent.Status}>{group.parent.Status}</span>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Fecha Creación:</span>
                              <template if:true={group.parent.createdDate}>
                              <lightning-formatted-date-time value={group.parent.createdDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time>
                              </template>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                  <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Fecha de Vencimiento:</span>
                                  <template if:true={group.parent.ActivityDate}>
                                <lightning-formatted-date-time value={group.parent.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time>
                              </template>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Tema:</span>
                              <span class="slds-text-body_medium" title={group.parent.themeLabel}>{group.parent.themeLabel}</span>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Subtema:</span>
                              <span class="slds-text-body_medium" title={group.parent.subthemeLabel}>{group.parent.subthemeLabel}</span>
                            </li>
                            <li class="slds-p-top_small slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                              <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Recordatorio:</span>
                              <template if:true={group.parent.reminderDateTime}>
                                <lightning-formatted-date-time value={group.parent.reminderDateTime} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                              </template>
                            </li>
                          </ul>
                        </article>
                        <!--<article class="slds-p-top- -none slds-box slds-theme_shade slds-p-around_medium slds-m-bottom_small">
                          <div class="slds-grid slds-wrap">
                            <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                                  <div class="slds-p-bottom_small"><strong>Asignado a:</strong> {group.parent.ownerName}</div>
                              <div class="slds-p-bottom_small"><strong>Estado:</strong> <span style="font-weight:bold">{group.parent.Status}</span></div>
                            </div>
                            <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                              <div class="slds-p-bottom_small"><strong>Fecha Creación:</strong> <template if:true={group.parent.createdDate}><lightning-formatted-date-time value={group.parent.createdDate} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time></template></div>
                              <div class="slds-p-bottom_small"><strong>Fecha de Vencimiento:</strong> <template if:true={group.parent.ActivityDate}><lightning-formatted-date-time value={group.parent.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time></template></div>

                            </div>
                          </div>
                        </article>-->
                      </template>
                      <template for:each={group.children} for:item="child">
                          <li class="slds-m-top_medium" key={child.Id}>
                            <div class="slds-grid slds-grid_align-spread slds-timeline__trigger" style="flex-wrap: wrap; align-items: start">
                              <div class="slds-media__figure" style="display:flex; align-items:center; gap:0.5rem">
                                <button class="slds-button slds-button_icon" aria-expanded={child.isExpanded} data-id={child.Id} onclick={toggleExpand}>
                                  <lightning-icon icon-name={child.expandIconName} size="x-small" class="slds-button__icon"></lightning-icon>
                                </button>
                                <div class="slds-icon_container slds-timeline__icon" title="Tarea">
                                  <lightning-icon icon-name="standard:task" size="small" title="Tarea"></lightning-icon>
                                </div>
                                <div class="slds-m-left_small child-title">
                                  <h3 class="slds-truncate" title={child.subjectDisplay} style="margin:0;">
                                    <a class={child.titleClass} data-id={child.Id} onclick={navigateToTask}>{child.subjectDisplay}</a>
                                  </h3>
                                </div>
                              </div>
                              <span class="slds-m-horizontal_xx-small" style="margin-left: auto">
                                <div style="display: flex; flex-direction: row;align-items: center;">
                                  <span data-id={child.OwnerId} onclick={navigate} class="UseLink slds-m-right_small" style="color: var(--lwc-colorTextLinkDisabled)">{child.ownerName}</span>
                                  <span class="slds-avatar slds-avatar_circle" style="height: unset">
                                    <img style="border-radius: 15px;padding: 1px;width: 25px;"
                                      alt={child.ownerName}
                                      src={child.CreatedBy.SmallPhotoUrl}
                                      title={child.ownerName}
                                    />
                                  </span>
                                </div>
                              </span>
                              <div class="slds-timeline__actions">
                                <template if:true={child.createdDate}>
                                  <span class="slds-timeline__date slds-m-left_small slds-m-top_xx-small" style="margin-top: 5px;">
                                    <lightning-formatted-date-time value={child.createdDate} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                  </span>
                                </template>
                              </div>
                              <!--<div class="slds-grid slds-grid_vertical-align-center slds-no-space">
                                <div class="slds-timeline__actions">
                                  <div class="slds-p-right_small">
                                    <a class="titleLinkNoBold" data-id={child.OwnerId}>{child.ownerName}</a>
                                  </div>
                                  <p class="slds-timeline__date slds-p-right_small" data-id={child.Id} onclick={toggleExpand} style="cursor:pointer;">
                                    <template if:true={child.createdDate}>
                                      <span class="slds-m-left_small">
                                        <lightning-formatted-date-time value={child.createdDate} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                      </span>
                                    </template>
                                  </p>
                                </div>
                              </div>-->
                            </div>

                            <template if:true={child.isExpanded}>
                              <!--<article class="slds-p-top- -none slds-box slds-theme_shade slds-p-around_medium slds-m-top_x-small">
                                <div class="slds-grid slds-wrap">
                                  <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                                    <!- - <div class="slds-p-bottom_small"><strong>Asunto:</strong> <a class="titleLinkNoBold" data-id={child.Id} onclick={navigateToTask}>{child.Subject}</a></div> - ->
                                    <div class="slds-p-bottom_small"><strong>Asignado a:</strong> {child.ownerName}</div>
                                    <div class="slds-p-bottom_small"><strong>Estado:</strong> <span style="font-weight:bold">{child.Status}</span></div>
                                  </div>
                                  <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                                    <div class="slds-p-bottom_small"><strong>Fecha Revisión:</strong> <template if:true={child.ActivityDate}><lightning-formatted-date-time value={child.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time></template></div>
                                    <div class="slds-p-bottom_small"><strong>Fecha de Vencimiento:</strong> <template if:true={child.ActivityDate}><lightning-formatted-date-time value={child.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time></template></div>
                                    <div class="slds-p-bottom_small"><strong>Relacionado con:</strong> {child.relatedLabel}</div>
                                  </div>
                                </div>
                              </article>-->
                              <article class="slds-p-top--none slds-box slds-theme_shade slds-p-around_medium slds-m-top_xx-small">
                                <ul class="slds-list_horizontal slds-wrap slds-m-left_medium">
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Asignado a:</span>
                                        <span class="slds-text-body_medium" title={child.ownerName}>{child.ownerName}</span>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Estado:</span>
                                        <span class="slds-text-body_medium" title={child.Status}>{child.Status}</span>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Fecha de Revisión:</span>
                                        <template if:true={child.ActivityDate}>
                                          <lightning-formatted-date-time value={child.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time>
                                        </template>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Fecha de Vencimiento:</span>
                                        <template if:true={child.ActivityDate}>
                                          <lightning-formatted-date-time value={child.ActivityDate} year="numeric" month="2-digit" day="2-digit"></lightning-formatted-date-time>
                                        </template>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Tema:</span>
                                        <span class="slds-text-body_medium" title={child.themeLabel}>{child.themeLabel}</span>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Subtema:</span>
                                        <span class="slds-text-body_medium" title={child.subthemeLabel}>{child.subthemeLabel}</span>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Recordatorio:</span>
                                        <template if:true={child.reminderDateTime}>
                                          <lightning-formatted-date-time value={child.reminderDateTime} year="numeric" month="2-digit" day="2-digit" hour="2-digit" minute="2-digit"></lightning-formatted-date-time>
                                        </template>
                                      </li>
                                      <li class="slds-p-top_medium slds-grid slds-grid_vertical slds-size_1-of-2 slds-p-bottom_small">
                                        <span class="slds-text-title slds-p-bottom_x-small" style="color: var(--lwc-brandTextLink)">Relacionado con:</span>
                                        <span class="slds-text-body_medium" title={child.relatedLabel}>{child.relatedLabel}</span>
                                      </li>
                                </ul>
                              </article>
                            </template>

                          </li>
                        </template>
                    </div>
                  </div>
                </div>
              </li>
            </template>
          </ul>

        </template>
        <template if:false={hasTasks}>
          <div class="slds-text-color_weak">No hay tareas relacionadas.</div>
        </template>
      </template>
    </div>

    <!-- Create Parent Task Modal (simplified) -->
    <template if:true={showCreateModal}>
      <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open" aria-labelledby="modal-heading-01" aria-modal="true">
        <div class="slds-modal__container">
          <header class="slds-modal__header">
            <h2 id="modal-heading-01" class="slds-text-heading_medium">Nueva Tarea</h2>
          </header>
          <div class="slds-modal__content slds-p-around_medium">
            <div class="create-task-form">
              <template if:true={newTaskError}>
                <div class="modalError slds-p-around_small slds-m-bottom_small">{newTaskError}</div>
              </template>

              <div class="slds-form slds-form_stacked">
                <div class="slds-form-element">
                  <!--<label class="slds-form-element__label">Asunto</label>
                  <div class="slds-form-element__control subjectInput" style="position:relative;">
                    <lightning-input type="text" data-field="Subject" value={newTaskSubject} oninput={handleSubjectInput} onchange={handleSubjectInput} onfocus={handleSubjectFocus} onkeydown={handleSubjectKeyDown} onblur={handleSubjectBlur} aria-autocomplete="list" placeholder="Escriba Parent o Child..."></lightning-input>
                    <template if:true={showSubjectSuggestions}>
                      <ul class="subject-suggestions slds-list_vertical slds-box slds-m-top_x-small" role="listbox">
                        <template for:each={subjectSuggestions} for:item="s" for:index="i">
                          <li key={s.value} data-value={s.value} role="option" aria-selected={s.isHighlighted} onmousedown={suggestionMouseDown} onclick={handleSelectSuggestion}>
                            <div style="display:flex; gap:8px; align-items:center;">
                              <div style="flex:1; font-size:0.95rem; font-weight:600;">{s.parent}</div>
                            </div>
                          </li>
                        </template>
                      </ul>
                    </template>

                    <template if:true={lastSubjectError}>
                      <div class="slds-text-color_error slds-m-top_x-small">Error: {lastSubjectError}</div>
                    </template>

                    <template if:true={subjectLoading}>
                      <div class="slds-m-top_x-small"><lightning-spinner size="small" alternative-text="Cargando sugerencias"></lightning-spinner></div>
                    </template>

                    <template if:true={subjectNoResults}>
                      <div class="slds-m-top_x-small slds-text-color_weak">No se encontraron sugerencias</div>
                    </template>

                  </div>-->
                  <lightning-combobox
                      data-field="Subject"
                      name="parentSubject"
                      label="Asunto"
                      placeholder="Elija un asunto"
                      options={parentSubjectOptions}
                      value={newTaskSubject}
                      onchange={handleParentSubjectInput}>
                  </lightning-combobox>
                </div>

                <div class="slds-grid slds-grid_align-spread slds-m-top_medium">
                  <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                    <label class="slds-form-element__label">Fecha de Vencimiento</label>
                    <lightning-input type="date" data-field="ActivityDate" value={newTaskActivityDate} onchange={handleNewInputChange}></lightning-input>

                    <div class="slds-m-top_small">
                      <label class="slds-form-element__label">Asignado a</label>
                      <div class="slds-form-element__control">
                        <div class="slds-box lockedRelated">{newTaskOwnerLabel}</div>
                      </div>
                    </div>
                  </div>
                  <div class="slds-col slds-size_1-of-2 slds-m-vertical_small">
                    <!-- intentionally left blank to keep layout width aligned -->
                  </div>
                </div>

                <div class="slds-form-element slds-m-top_medium">
                  <label class="slds-form-element__label">Relacionado con </label>
                  <div class="slds-form-element__control">
                    <template if:true={newTaskWhatLocked}>
                      <div class="slds-box">{newTaskWhatLabel}</div>
                    </template>
                    <template if:false={newTaskWhatLocked}>
                      <lightning-input type="text" data-field="WhatId" value={newTaskWhatId} onchange={handleNewInputChange}></lightning-input>
                    </template>
                  </div>
                </div>

              </div>

              <footer class="slds-modal__footer">
                <lightning-button variant="neutral" label="Cancelar" onclick={closeCreateModal}></lightning-button>
                <lightning-button variant="brand" label="Guardar" onclick={handleCreateSave}></lightning-button>
              </footer>
            </div>
          </div>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
  </lightning-card>
</template>
