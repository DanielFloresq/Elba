<!--
  @description       : Document upload component for attaching files to cases with documentary phase and type selection
  @author            : Daniel Flores
  @group             : 
  @last modified on  : 14-01-2026
  @last modified by  : Daniel Flores
-->
<template>
    <lightning-card title={label.AddDocuments}>
        <div class="slds-p-around_medium">

            <!-- Case Number -->
            <lightning-combobox
                name="linkedEntity"
                label={linkedEntityLabel}
                options={relatedOrdersOptions}
                value={linkedEntityId}
                onchange={handleLinkedEntityChange}>
            </lightning-combobox>

            <!-- Fase Documental -->
            <lightning-combobox
                name="faseDocumental"
                label="Fase Documental"
                options={faseDocumentalOptions}
                value={faseDocumental}
                onchange={handleFaseDocumentalChange}
                required>
            </lightning-combobox>

            <!-- Tipo Documental -->
            <lightning-combobox
                name="documentType"
                label={label.DocumentaryType}
                options={documentTypeOptions}
                value={tipoDocumental}
                onchange={handleTipoDocumental}
                required
               >
            </lightning-combobox>

            <!-- Comentarios -->
            <lightning-textarea
                label={label.Comments}
                value={description}
                onchange={handleDescription}>
            </lightning-textarea>

            <!-- File input -->
            <lightning-input
                type="file"
                label={label.SelectFiles}
                multiple
                onchange={handleFilesChange}>
            </lightning-input>

            <!-- Lista de ficheiros -->
            <template if:true={hasFiles}>
                <div class="file-list slds-m-top_medium">
                    <p class="slds-text-title_bold">
                        {label.AddedFiles}
                    </p>

                    <template for:each={files} for:item="file" for:index="index">
                        <div key={file.key} class="file-row">
                            <span class="file-name">{file.name}</span>

                            <lightning-button-icon
                                icon-name="utility:close"
                                alternative-text={label.Remove}
                                size="small"
                                variant="bare"
                                data-index={index}
                                onclick={handleRemoveFile}>
                            </lightning-button-icon>
                        </div>
                    </template>
                </div>
            </template>
            <div class="slds-m-top_medium">
                <lightning-button
                    label={label.AddToList}
                    onclick={handleUpload}
                    disabled={isUploadDisabled}>
                </lightning-button>
            </div>
        </div>
        
    </lightning-card>
</template>
